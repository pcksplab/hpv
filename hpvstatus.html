        body {
            font-family: 'Sarabun', sans-serif;
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .animate-spin-custom {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #be185d;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: loader-spin 1s linear infinite;
        }

        @keyframes loader-spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Announcement Ticker Styles */
        @keyframes marquee {
            0% {
                transform: translateX(100%);
            }

            100% {
                transform: translateX(-100%);
            }
        }

        .animate-marquee {
            display: inline-block;
            animation: marquee 30s linear infinite;
            will-change: transform;
        }

        .animate-marquee:hover {
            animation-play-state: paused;
        }

        #desktop-tbody tr {
            height: 40px;
        }
        #desktop-tbody tr td {
            height: 40px;
            overflow: hidden;
        }
    </style>
</head>

    <script>
        const SPREADSHEET_ID = '1474eE5jGXvnw7QrhOhQwt96VJGLJpTG2vTPu4OVbHxM';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=86987800`;
        const LINKS_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTNe0I0UR1Hfjw1qn_vyMGTWyweFFZl-aUFDq4ALllLY6clGxhKaxyM6orS_ZMxu3J5qAmU4WdvT2TL/pub?output=csv&gid=265832376';

        let allData = [];
        let hospitalLinks = {};
        let searchTerm = '';
        let selectedStatus = 'all';
        let currentPage = 1;
        const itemsPerPage = 10;

        async function loadHospitalLinks() {
            try {
                const response = await fetch(LINKS_CSV_URL);
                const data = await response.text();
                const lines = data.split('\n');
                lines.forEach(line => {
                    const row = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.trim().replace(/^"|"$/g, ''));
                    if (row.length >= 2 && row[0]) {
                        hospitalLinks[row[0]] = row[1];
                    }
                });
                console.log('โหลดลิงก์หน่วยงานแล้ว:', Object.keys(hospitalLinks).length);
            } catch (error) {
                console.error('เกิดข้อผิดพลาดในการโหลดลิงก์:', error);
            }
        }

        const parseDateTime = (str) => {
            if (!str || typeof str !== 'string') return 0;
            try {
                const [datePart, timePart] = str.trim().split(/\s+/);
                const [d, m, y] = datePart.split('/').map(Number);
                const year = y > 2500 ? y - 543 : y;
                let hour = 0, min = 0, sec = 0;
                if (timePart) {
                    const [hh, mm, ss] = timePart.split(':').map(Number);
                    hour = hh || 0; min = mm || 0; sec = ss || 0;
                }
                return new Date(year, m - 1, d, hour, min, sec).getTime();
            } catch (e) { return 0; }
        };

        const parseCSV = (text) => {
            const lines = text.split(/\r?\n/);
            return lines.map(line => {
                const result = [];
                let current = '';
                let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) {
                        result.push(current);
                        current = '';
                    } else {
                        current += char;
                    }
                }
                result.push(current);
                return result;
            });
        };

        const renderData = () => {
            const filtered = allData.filter(row => {
                const s = searchTerm.toLowerCase();
                const isReported = row.reportedAt && row.reportedAt.trim() !== '';
                const matchesStatus = selectedStatus === 'all' ||
                    (selectedStatus === 'reported' && isReported) ||
                    (selectedStatus === 'pending' && !isReported);

                return matchesStatus && (
                    (row.mainAgency && row.mainAgency.toLowerCase().includes(s)) ||
                    row.agency.toLowerCase().includes(s) ||
                    row.fileName.toLowerCase().includes(s) ||
                    row.sentAt.toLowerCase().includes(s)
                );
            });

            const desktopTbody = document.getElementById('desktop-tbody');
            const mobileContainer = document.getElementById('mobile-container');
            const statusText = document.getElementById('status-text');
            const paginationContainer = document.getElementById('pagination-container');

            statusText.innerText = searchTerm ? `พบข้อมูล: ${filtered.length} รายการ` : 'ตรวจสอบสถานะการตรวจ';

            desktopTbody.innerHTML = '';
            mobileContainer.innerHTML = '';
            paginationContainer.innerHTML = '';

            if (filtered.length === 0) {
                const emptyMsg = `<div class="text-center py-12 text-slate-400 text-sm italic bg-white rounded-xl border border-dashed border-slate-300 w-full">ไม่พบข้อมูลที่ค้นหา</div>`;
                mobileContainer.innerHTML = emptyMsg;
                desktopTbody.innerHTML = `<tr><td colspan="7">${emptyMsg}</td></tr>`;
                return;
            }

            const totalPages = Math.ceil(filtered.length / itemsPerPage);
            if (currentPage > totalPages) currentPage = totalPages || 1;

            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageData = filtered.slice(start, end);

            pageData.forEach(row => {
                const isReported = row.reportedAt && row.reportedAt.trim() !== '';
                const link = row.link;
                const hasValidLink = link && link.startsWith('http');

                const agencyLink = hospitalLinks[row.agency.trim()];
                const agencyHtml = agencyLink
                    ? `<a href="${agencyLink}" target="_blank" class="hover:text-pink-700 hover:underline decoration-pink-300 transition-all">${row.agency}</a>`
                    : row.agency;

                // Desktop Row
                const tr = document.createElement('tr');
                tr.className = `transition-colors group hover:bg-slate-50/50`;
                tr.innerHTML = `
                    <td class="p-1.5 text-sm text-slate-500 italic">${row.sentAt}</td>
                    <td class="p-1.5 text-[11px] text-slate-400 font-normal leading-tight">${row.mainAgency}</td>
                    <td class="p-1.5 font-semibold text-sm text-slate-800 line-clamp-1">${agencyHtml}</td>
                    <td class="p-1.5 text-sm">
                        ${hasValidLink ? `
                            <a href="${link}" target="_blank" class="text-indigo-600 hover:text-pink-600 hover:underline font-medium break-all transition-all line-clamp-1 leading-snug">
                                ${row.fileName}
                            </a>
                        ` : `
                            <span class="text-slate-600 line-clamp-1 break-all leading-snug">${row.fileName}</span>
                        `}
                    </td>
                    <td class="p-1.5 text-center">
                        ${(hasValidLink && isReported) ? `
                            <button onclick="downloadAsPdf('${link}', '${row.fileName.replace(/'/g, "\\'")}')" class="p-1.5 bg-pink-50 text-pink-600 hover:bg-pink-600 hover:text-white rounded-lg transition-all shadow-sm active:scale-90 group" title="ดาวน์โหลด PDF">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                                </svg>
                            </button>
                        ` : `
                            <span class="text-slate-300" title="${!isReported ? 'รอดำเนินการ' : 'ไม่มีไฟล์'}">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636" />
                                </svg>
                            </span>
                        `}
                    </td>
                    <td class="p-1.5 text-center">
                        ${isReported ? `
                            <span class="px-2 py-1 rounded-full bg-emerald-500 text-white text-[10px] font-bold uppercase shadow-sm border border-emerald-400 whitespace-nowrap leading-tight">รายงานผลแล้ว</span>
                        ` : `
                            <span class="px-2 py-1 rounded-full bg-amber-100 text-amber-700 text-[10px] font-bold uppercase border border-amber-200 shadow-sm whitespace-nowrap leading-tight">รอดำเนินการ</span>
                        `}
                    </td>
                    <td class="p-1.5 text-center">
                        ${isReported ? `
                            <span class="text-[10px] text-slate-500 font-mono font-bold whitespace-nowrap leading-tight">${row.reportedAt.replace('|', ' ')}</span>
                        ` : `
                            <span class="text-[10px] text-slate-300 font-mono font-bold whitespace-nowrap leading-tight">-</span>
                        `}
                    </td>
                `;
                desktopTbody.appendChild(tr);

                // Mobile Card
                const card = document.createElement('div');
                card.className = `bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden transition-all duration-200`;
                card.innerHTML = `
                    <div class="h-1 w-full ${isReported ? 'bg-emerald-500' : 'bg-slate-300'}"></div>
                    <div class="p-4 space-y-3">
                        <div class="flex justify-between items-start gap-2">
                            <div class="flex items-center gap-1.5">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-pink-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
                                <span class="text-xs font-mono text-slate-500 font-bold">${row.sentAt}</span>
                            </div>
                            ${isReported ? `
                                <div class="flex flex-col items-end shrink-0">
                                    <span class="flex items-center gap-1 text-xs font-bold text-emerald-600 uppercase bg-emerald-50 px-2 py-1 rounded-lg border border-emerald-100 whitespace-nowrap">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> รายงานผลแล้ว
                                    </span>
                                    <span class="text-[10px] text-slate-500 font-mono font-bold mt-1 whitespace-nowrap">${row.reportedAt.replace('|', ' ')}</span>
                                </div>
                            ` : `
                                <span class="flex items-center gap-1 text-xs font-bold text-amber-600 uppercase bg-amber-50 px-2 py-1 rounded-lg border border-amber-100 whitespace-nowrap shrink-0">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> รอดำเนินการ
                                </span>
                            `}
                        </div>
                        <div class="space-y-1">
                            <div class="text-[11px] text-slate-400 font-medium uppercase tracking-tight">${row.mainAgency}</div>
                            <div class="text-base font-bold text-slate-800 leading-tight">${agencyHtml}</div>
                            <div class="mt-1.5">
                                ${hasValidLink ? `
                                    <a href="${link}" target="_blank" class="text-indigo-600 hover:text-pink-600 hover:underline text-sm font-medium break-all leading-relaxed block line-clamp-2 tracking-tight transition-all">
                                        ${row.fileName}
                                    </a>
                                ` : `
                                    <div class="text-sm text-slate-500 break-all leading-relaxed font-medium line-clamp-2">${row.fileName}</div>
                                `}
                            </div>
                        </div>
                        <div class="flex gap-2 mt-2 pt-2 border-t border-slate-50">
                            ${(hasValidLink && isReported) ? `
                                <button onclick="window.open('${link}', '_blank')" class="w-full flex items-center justify-center gap-2 py-2.5 bg-slate-50 text-slate-600 rounded-xl text-xs font-bold active:scale-95 transition-all border border-slate-100">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                                    </svg>
                                    เปิดเอกสารใน Google Sheet
                                </button>
                            ` : `
                                <div class="flex-1 py-2 text-center text-xs text-slate-300 font-medium italic">
                                    ${!isReported ? 'สถานะ: รอดำเนินการ' : 'ไม่มีเอกสารแนบ'}
                                </div>
                            `}
                        </div>
                    </div>
                `;
                mobileContainer.appendChild(card);
            });

            // Render Pagination Buttons
            if (totalPages > 1) {
                const createPageBtn = (page, text, isActive = false, isDisabled = false) => {
                    const btn = document.createElement('button');
                    btn.innerText = text;
                    btn.className = `px-3 py-1.5 rounded-lg text-xs font-medium transition-all ${isActive
                        ? 'bg-pink-600 text-white shadow-sm'
                        : isDisabled
                            ? 'opacity-30 cursor-not-allowed text-slate-400'
                            : 'bg-white text-slate-600 hover:bg-slate-50 border border-slate-200'}`;
                    if (!isActive && !isDisabled) {
                        btn.onclick = () => {
                            currentPage = page;
                            renderData();
                            window.scrollTo({ top: 0, behavior: 'smooth' });
                        };
                    }
                    return btn;
                };

                // First Page Button
                paginationContainer.appendChild(createPageBtn(1, '«', false, currentPage === 1));

                // Prev Button
                paginationContainer.appendChild(createPageBtn(currentPage - 1, '‹', false, currentPage === 1));

                // Page Numbers (Show max 4 pages around current)
                let startPage = Math.max(1, currentPage - 1);
                let endPage = Math.min(totalPages, startPage + 3);
                if (endPage - startPage < 3) startPage = Math.max(1, endPage - 3);

                for (let i = startPage; i <= endPage; i++) {
                    paginationContainer.appendChild(createPageBtn(i, i, i === currentPage));
                }

                // Next Button
                paginationContainer.appendChild(createPageBtn(currentPage + 1, '›', false, currentPage === totalPages));

                // Last Page Button
                paginationContainer.appendChild(createPageBtn(totalPages, '»', false, currentPage === totalPages));

                // Total Pages Indicator
                const pageIndicator = document.createElement('span');
                pageIndicator.className = 'text-[11px] text-slate-400 font-medium ml-2';
                pageIndicator.innerText = `หน้า ${currentPage} จาก ${totalPages}`;
                paginationContainer.appendChild(pageIndicator);
            }
        };

        const updateSuggestions = (term = '') => {
            const datalist = document.getElementById('search-suggestions');
            if (!datalist) return;

            // เริ่ม Suggest เมื่อพิมพ์อย่างน้อย 2 ตัวอักษร
            if (term.length < 2) {
                datalist.innerHTML = '';
                return;
            }

            const suggestions = new Set();
            const s = term.toLowerCase();

            // คัดกรองข้อมูลที่ตรงกับคำค้นหา
            allData.forEach(item => {
                if (item.agency && item.agency.toLowerCase().includes(s)) suggestions.add(item.agency.trim());
                if (item.mainAgency && item.mainAgency.toLowerCase().includes(s)) suggestions.add(item.mainAgency.trim());
            });

            datalist.innerHTML = '';
            // จำกัดจำนวน Suggest ไว้ที่ 15 รายการ เพื่อความสวยงามและไม่เยอะเกินไป
            Array.from(suggestions)
                .sort()
                .slice(0, 15)
                .forEach(val => {
                    const option = document.createElement('option');
                    option.value = val;
                    datalist.appendChild(option);
                });
        };

        const fetchData = async () => {
            const refreshIcon = document.getElementById('refresh-icon');
            const skeleton = document.getElementById('loading-skeleton');
            const errorContainer = document.getElementById('error-container');
            const loadingOverlay = document.getElementById('loading-overlay');

            if (refreshIcon) refreshIcon.classList.add('animate-spin-custom');
            if (skeleton) skeleton.classList.remove('hidden');
            if (errorContainer) errorContainer.classList.add('hidden');
            if (loadingOverlay) {
                loadingOverlay.classList.remove('hidden');
                loadingOverlay.style.opacity = '1';
            }

            try {
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error('ไม่สามารถเข้าถึงข้อมูลได้ (ตรวจสอบสิทธิ์การเข้าถึง Spreadsheet)');
                const csvText = await response.text();

                Papa.parse(csvText, {
                    header: false,
                    skipEmptyLines: true,
                    complete: function (results) {
                        const rows = results.data;
                        allData = rows.slice(1)
                            .map((cols, index) => ({
                                id: index,
                                sentAt: cols[0] || '',
                                mainAgency: cols[8] || '',
                                agency: cols[1] || '',
                                fileName: cols[3] || '',
                                reportedAt: cols[6] || '',
                                link: cols[7] || '',
                                timestamp: parseDateTime(cols[0])
                            }))
                            .filter(item => item.agency && item.agency.trim() !== '' && !item.agency.includes('ชื่อหน่วยงาน'))
                            .sort((a, b) => b.timestamp - a.timestamp);

                        // ไม่ต้องอัปโหลด Suggest ทันที รอรอบพิมพ์
                        renderData();
                        finishLoading();
                    },
                    error: function (err) {
                        throw new Error('เกิดข้อผิดพลาดในการประมวลผลข้อมูล: ' + err.message);
                    }
                });

            } catch (err) {
                if (errorContainer) errorContainer.classList.remove('hidden');
                document.getElementById('error-message').innerText = err.message;
                finishLoading();
            }

            function finishLoading() {
                if (refreshIcon) refreshIcon.classList.remove('animate-spin-custom');
                if (skeleton) skeleton.classList.add('hidden');
                if (loadingOverlay) {
                    loadingOverlay.style.opacity = '0';
                    setTimeout(() => {
                        loadingOverlay.classList.add('hidden');
                    }, 500);
                }
            }
        };

        document.getElementById('search-input').addEventListener('input', (e) => {
            searchTerm = e.target.value;
            currentPage = 1;
            updateSuggestions(searchTerm);
            renderData();
        });

        document.getElementById('status-filter-select').addEventListener('change', (e) => {
            selectedStatus = e.target.value;
            document.getElementById('status-filter-header').value = selectedStatus;
            currentPage = 1;
            renderData();
        });

        document.getElementById('status-filter-header').addEventListener('change', (e) => {
            selectedStatus = e.target.value;
            document.getElementById('status-filter-select').value = selectedStatus;
            currentPage = 1;
            renderData();
        });

        document.getElementById('refresh-btn').addEventListener('click', fetchData);

        window.onload = async () => {
            await loadHospitalLinks();
            await fetchData(); // โหลดข้อมูลหลักให้จบ
            setTimeout(fetchAnnouncements, 1500); // ดีเลย์ประกาศไว้ท้ายสุด เพื่อไม่ให้รบกวนหน้าเว็บตอนเริ่ม
        };

        async function fetchAnnouncements() {
            const URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTNe0I0UR1Hfjw1qn_vyMGTWyweFFZl-aUFDq4ALllLY6clGxhKaxyM6orS_ZMxu3J5qAmU4WdvT2TL/pub?output=csv&gid=671107847';
            try {
                const response = await fetch(URL);
                const data = await response.text();
                const lines = data.split('\n').filter(line => line.trim());

                // Parse CSV and get Column A
                const messages = lines.map(line => {
                    const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/^"|"$/g, ''));
                    return cols[0];
                }).filter(m => m && m !== 'ข้อความประกาศ' && m !== 'Announcement' && m !== 'announcement');

                if (messages.length > 0) {
                    const tickerText = messages.join(' •   • ');
                    document.getElementById('announcement-text').innerText = tickerText;
                    document.getElementById('announcement-container').classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error loading announcements:', error);
            }
        }

        // Download as PDF Function
        window.downloadAsPdf = (url, filename) => {
            let downloadUrl = url;

            if (url.includes('docs.google.com/spreadsheets')) {
                // สำหรับ Google Sheets: ตั้งค่า Export เป็น PDF พร้อมขอบกระดาษแคบที่สุด (0)
                downloadUrl = url.split('/edit')[0].split('/view')[0] +
                    '/export?format=pdf' +
                    '&size=A4' +
                    '&portrait=false' +       // แนวนอน (Landscape)
                    '&fitw=true' +            // ปรับให้พอดีความกว้างหน้ากระดาษ
                    '&gridlines=false' +      // ไม่เอาเส้นตาราง
                    '&printtitle=false' +     // ไม่เอาชื่อไฟล์ที่หัวกระดาษ
                    '&sheetnames=false' +
                    '&pagenumbers=false' +
                    '&fzr=false' +
                    '&top_margin=0.3' +       // ขอบบน 0.3
                    '&bottom_margin=0.3' +    // ขอบล่าง 0.3
                    '&left_margin=0.3' +      // ขอบซ้าย 0.3
                    '&right_margin=0.3';      // ขอบขวา 0.3 (เผื่อระยะการพิมพ์)
            } else if (url.includes('docs.google.com/document')) {
                // สำหรับ Google Docs
                downloadUrl = url.split('/edit')[0].split('/view')[0] + '/export?format=pdf';
            } else if (url.includes('drive.google.com')) {
                // สำหรับไฟล์อื่นๆ ใน Drive
                downloadUrl = url.replace(/\/view(\?.*)?$/, '/export?format=pdf');
                if (!downloadUrl.includes('/export')) {
                    downloadUrl = downloadUrl.replace(/\/d\/(.*?)(\/|$)/, '/d/$1/export?format=pdf');
                }
            }

            // เปิดลิงก์เพื่อทำการดาวน์โหลด (ปรับปรุงให้ใช้ได้ทั้งคอมและมือถือ)
            try {
                const linkElement = document.createElement('a');
                linkElement.href = downloadUrl;
                linkElement.target = '_blank';
                // ป้องกันปัญหา Popup Blocker ในมือถือบางรุ่น
                document.body.appendChild(linkElement);
                linkElement.click();
                setTimeout(() => {
                    document.body.removeChild(linkElement);
                }, 100);
            } catch (e) {
                // กรณีฉุกเฉิน: ใช้การเปลี่ยนหน้าตรงๆ
                window.location.href = downloadUrl;
            }
        };
    </script>
</body>
